services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: generosity-pays-dev
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
    restart: unless-stopped
