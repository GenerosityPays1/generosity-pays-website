services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: generosity-pays-staging
    ports:
      - "3001:3000"
    volumes:
      - staging-data:/app/data
      - staging-uploads:/app/uploads
      - staging-backups:/app/backups
    env_file:
      - .env.staging
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  staging-data:
  staging-uploads:
  staging-backups:
