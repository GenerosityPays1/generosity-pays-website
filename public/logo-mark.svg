<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Rays - 7 gold lines emanating from crown of heart -->
  <line x1="100" y1="38" x2="100" y2="6" stroke="#C4A265" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="88" y1="41" x2="80" y2="11" stroke="#C4A265" stroke-width="3" stroke-linecap="round"/>
  <line x1="112" y1="41" x2="120" y2="11" stroke="#C4A265" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="48" x2="62" y2="20" stroke="#C4A265" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="124" y1="48" x2="138" y2="20" stroke="#C4A265" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="66" y1="56" x2="48" y2="34" stroke="#C4A265" stroke-width="2" stroke-linecap="round"/>
  <line x1="134" y1="56" x2="152" y2="34" stroke="#C4A265" stroke-width="2" stroke-linecap="round"/>

  <!-- Heart - gold fill with thick dark outline, round lobes -->
  <path d="M100 122
           C96 116 52 88 52 62
           C52 40 68 30 86 40
           C94 45 100 58 100 58
           C100 58 106 45 114 40
           C132 30 148 40 148 62
           C148 88 104 116 100 122Z"
        fill="#C4A265" stroke="#1A1714" stroke-width="5.5" stroke-linejoin="round"/>

  <!-- Hand - smooth sweeping strokes forming open cupped palm -->
  <!-- Upper/inner palm stroke: gentle arc -->
  <path d="M36 130
           C62 137 90 140 115 136
           C140 132 162 118 180 106"
        stroke="#1A1714" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Lower/outer stroke: wrist sweeps down through palm, up to fingertips -->
  <path d="M14 156
           C45 150 72 164 105 164
           C138 164 168 140 186 112"
        stroke="#1A1714" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
